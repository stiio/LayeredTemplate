<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>OIDC Test Client</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f4ed; color: #141413; }
        h2 { font-family: Georgia, serif; }
        h3 { font-family: Georgia, serif; margin-top: 24px; }
        .actions { margin: 16px 0; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 16px; border-radius: 8px; border: 1px solid #e8e6dc; cursor: pointer; font-size: 14px; }
        .btn-login { background: #c96442; color: white; border: none; }
        .btn-logout { background: #b53333; color: white; border: none; }
        .btn-action { background: #e8e6dc; color: #4d4c48; }
        .btn-action:hover { background: #d6d4cc; }
        pre { background: #faf9f5; padding: 16px; border-radius: 8px; overflow: auto; max-height: 400px; border: 1px solid #f0eee6; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
        .token-box { margin: 8px 0; }
        .token-box textarea { width: 100%; height: 80px; font-family: monospace; font-size: 12px; border-radius: 8px; border: 1px solid #e8e6dc; padding: 8px; resize: vertical; box-sizing: border-box; }
        .card { background: #faf9f5; border: 1px solid #f0eee6; border-radius: 8px; padding: 20px; margin: 16px 0; }
        .status { padding: 8px 12px; border-radius: 6px; margin: 8px 0; font-size: 14px; }
        .status-ok { background: #f4f8f0; border: 1px solid #c8d8b8; color: #4a7c2e; }
        .status-err { background: #fdf2f0; border: 1px solid #e8c4bc; color: #b53333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #f0eee6; font-size: 13px; }
        th { color: #87867f; font-weight: 500; }
        td:first-child { font-family: monospace; color: #5e5d59; }
        #guest, #dashboard { display: none; }
    </style>
</head>
<body>
    <h2>OIDC Test Client</h2>

    <div id="guest">
        <p>Test client for Auth.Web OpenIddict server.</p>
        <button class="btn-login" id="login">Log in with Auth Server</button>
    </div>

    <div id="dashboard">
        <div class="actions">
            <button class="btn-action" id="refresh">Refresh Token</button>
            <button class="btn-action" id="userinfo">Call /connect/userinfo</button>
            <button class="btn-logout" id="logout">Logout</button>
        </div>

        <div id="status-area"></div>

        <h3>ID Token Claims</h3>
        <div class="card">
            <table><thead><tr><th>Claim</th><th>Value</th></tr></thead><tbody id="id-claims"></tbody></table>
        </div>

        <h3>Access Token Claims</h3>
        <div class="card">
            <table><thead><tr><th>Claim</th><th>Value</th></tr></thead><tbody id="at-claims"></tbody></table>
        </div>

        <h3>Tokens</h3>
        <div class="card">
            <div class="token-box">
                <strong>Access Token</strong>
                <textarea id="access-token" readonly></textarea>
            </div>
            <div class="token-box">
                <strong>ID Token</strong>
                <textarea id="id-token" readonly></textarea>
            </div>
            <div class="token-box">
                <strong>Refresh Token</strong>
                <textarea id="refresh-token" readonly></textarea>
            </div>
        </div>

        <h3>UserInfo Response</h3>
        <pre id="userinfo-result">Click "Call /connect/userinfo" to fetch.</pre>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
