<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Welcome!</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .celebrate { text-align: center; padding: 40px 20px; }
        .celebrate .emoji { font-size: 72px; line-height: 1; margin-bottom: 16px; }
        .celebrate h2 { font-size: 28px; margin-bottom: 8px; }
        .celebrate p { color: #5e5d59; margin: 8px 0; }
    </style>
</head>
<body>
    <div class="card celebrate">
        <div class="emoji">🎉</div>
        <h2>Welcome aboard!</h2>
        <p>Your account has been set up successfully.</p>
        <p>You can now sign in to the app with the credentials you just chose.</p>
        <p style="margin-top: 24px;">
            <a href="/" class="btn-login" style="display: inline-block; text-decoration: none;">Go to login</a>
        </p>
    </div>
</body>
</html>
