<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Callback</title></head>
<body>
<script type="module">
    import { mgr } from './oidc-config.js';
    mgr.signinRedirectCallback().then(user => {
        // Custom state passed to signinRedirect({ state: {...} }) comes back on user.state.
        // Supports two flows:
        //   - invite acceptance → { inviteId } → lands on /invite-complete.html
        //   - protected page flow → { returnTo } → returns to the originating page
        const state = user?.state;
        if (state?.inviteId) {
            window.location = '/invite-complete.html?inviteId=' + encodeURIComponent(state.inviteId);
        } else if (typeof state?.returnTo === 'string' && state.returnTo.startsWith('/')) {
            window.location = state.returnTo;
        } else {
            window.location = '/index.html';
        }
    }).catch(e => {
        document.body.innerText = 'Error: ' + e.message;
        console.error(e);
    });
</script>
</body>
</html>
