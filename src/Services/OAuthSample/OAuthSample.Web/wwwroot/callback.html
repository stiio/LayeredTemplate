<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Callback</title></head>
<body>
<script type="module">
    import { mgr } from './oidc-config.js';
    mgr.signinRedirectCallback().then(user => {
        // Custom state passed to signinRedirect({ state: {...} }) comes back on user.state.
        // Invite flow stashes { inviteId } so it survives the OIDC roundtrip — replay it here.
        const inviteId = user?.state?.inviteId;
        if (inviteId) {
            window.location = '/invite-complete.html?inviteId=' + encodeURIComponent(inviteId);
        } else {
            window.location = '/index.html';
        }
    }).catch(e => {
        document.body.innerText = 'Error: ' + e.message;
        console.error(e);
    });
</script>
</body>
</html>
