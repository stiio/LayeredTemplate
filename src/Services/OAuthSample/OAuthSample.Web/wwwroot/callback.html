<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Callback</title></head>
<body>
<script type="module">
    import { mgr } from './oidc-config.js';
    mgr.signinRedirectCallback().then(() => {
        window.location = '/index.html';
    }).catch(e => {
        document.body.innerText = 'Error: ' + e.message;
        console.error(e);
    });
</script>
</body>
</html>
