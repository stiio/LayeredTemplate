<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Callback</title></head>
<body>
<script type="module">
    import { UserManager } from 'https://cdn.jsdelivr.net/npm/oidc-client-ts@3/+esm';
    new UserManager({
        authority: 'https://localhost:8080',
        client_id: 'default_client',
        redirect_uri: window.location.origin + '/callback.html',
        response_mode: 'query',
    }).signinRedirectCallback().then(() => {
        window.location = '/index.html';
    }).catch(e => {
        document.body.innerText = 'Error: ' + e.message;
        console.error(e);
    });
</script>
</body>
</html>
