components:
  schemas:
    CurrentUser:
      type: object
      properties:
        id:
          type: string
          description: Id of user
          format: uuid
        email:
          type:
            - 'null'
            - string
          description: Email of user
          example: example@email.com
        emailVerified:
          type: boolean
          description: Email Verified
        phone:
          type:
            - 'null'
            - string
          description: Phone of user
        phoneVerified:
          type: boolean
          description: Phone Verified
        firstName:
          type:
            - 'null'
            - string
          description: First Name of user
          example: John
        lastName:
          type:
            - 'null'
            - string
          description: Last Name of user
          example: Doe
      additionalProperties: false
      description: Current user
    DirectionType:
      enum:
        - Asc
        - Desc
      type: string
      description: Direction type
    ErrorResult:
      type: object
      properties:
        message:
          type:
            - 'null'
            - string
          description: Message
        traceId:
          type:
            - 'null'
            - string
          description: Trace id
      additionalProperties: false
      description: Error result
    InfoResponse:
      type: object
      properties:
        buildDate:
          type:
            - 'null'
            - string
          description: Build date
          example: '2022-11-15T12:00:00.0000000Z'
        version:
          type:
            - 'null'
            - string
          description: Version
      additionalProperties: false
      description: Info response
    PaginationRequest:
      required:
        - limit
        - page
      type: object
      properties:
        page:
          maximum: 2147483647
          minimum: 1
          type: integer
          description: 'Page number (default: 1)'
          format: int32
          example: 1
        limit:
          maximum: 100
          minimum: 1
          type: integer
          description: 'Limit items on page (default: 10)'
          format: int32
          example: 10
      additionalProperties: false
      description: Pagination request
    PaginationResponse:
      required:
        - limit
        - page
        - total
      type: object
      properties:
        page:
          maximum: 2147483647
          minimum: 1
          type: integer
          description: Page number
          format: int32
          example: 1
        limit:
          maximum: 100
          minimum: 1
          type: integer
          description: Limit items on page
          format: int32
          example: 10
        total:
          type: integer
          description: Total items
          format: int64
          example: 100
      additionalProperties: false
      description: Pagination response
    SortingTodoListDto:
      required:
        - column
        - direction
      type: object
      properties:
        column:
          minLength: 1
          enum:
            - Id
            - Name
            - Description
            - CreatedAt
          type: string
          description: Name of field for sort
        direction:
          description: Direction type
          $ref: '#/components/schemas/DirectionType'
      additionalProperties: false
    SuccessfulResult:
      type: object
      properties:
        message:
          type:
            - 'null'
            - string
          description: Message
      additionalProperties: false
      description: Successful result
    TodoListCreateRequestBody:
      required:
        - name
      type: object
      properties:
        name:
          minLength: 1
          type: string
          description: Name
        description:
          type:
            - 'null'
            - string
          description: Description
      additionalProperties: false
      description: Todo list create request body
    TodoListDto:
      type: object
      properties:
        id:
          type: string
          description: Id
          format: uuid
        name:
          type:
            - 'null'
            - string
          description: Name
        description:
          type:
            - 'null'
            - string
          description: Description
        createdAt:
          type: string
          description: Created at
          example: '2022-11-15T12:00:00.0000000Z'
      additionalProperties: false
      description: Todo list dto
    TodoListSearchFilterDto:
      type: object
      properties:
        search:
          type:
            - 'null'
            - string
          description: Search
      additionalProperties: false
      description: Todo list search filter dto
    TodoListSearchRequestBody:
      type: object
      properties:
        filter:
          description: Todo list search filter dto
          $ref: '#/components/schemas/TodoListSearchFilterDto'
        sorting:
          description: Sorting
          $ref: '#/components/schemas/SortingTodoListDto'
        pagination:
          description: Pagination request
          $ref: '#/components/schemas/PaginationRequest'
      additionalProperties: false
      description: Todo list search request body
    TodoListSearchResponse:
      type: object
      properties:
        filter:
          description: Filter
          $ref: '#/components/schemas/TodoListSearchFilterDto'
        sorting:
          description: Sorting
          $ref: '#/components/schemas/SortingTodoListDto'
        pagination:
          description: Pagination response
          $ref: '#/components/schemas/PaginationResponse'
        data:
          type:
            - 'null'
            - array
          items:
            description: Todo list dto
            $ref: '#/components/schemas/TodoListDto'
          description: Data
      additionalProperties: false
      description: Todo list search response
    TodoListUpdateRequestBody:
      required:
        - name
      type: object
      properties:
        name:
          minLength: 1
          type: string
          description: Name
        description:
          type:
            - 'null'
            - string
          description: Description
      additionalProperties: false
      description: Todo list update request body
    UserEmailCodeSendRequest:
      required:
        - email
      type: object
      properties:
        email:
          maxLength: 255
          minLength: 1
          type: string
          description: Email
          format: email
          example: example@email.com
      additionalProperties: false
      description: User email code send request
    UserEmailCodeVerifyRequest:
      required:
        - code
        - email
      type: object
      properties:
        email:
          maxLength: 255
          minLength: 1
          type: string
          description: Email
          format: email
          example: example@email.com
        code:
          type: integer
          description: Code
          format: int32
          example: 124567
      additionalProperties: false
      description: User email code verify request
  securitySchemes:
    Bearer:
      type: http
      description: Specify the authorization token.
      scheme: Bearer
      bearerFormat: JWT
    ApiKey:
      type: apiKey
      description: Specify the api key.
      name: X-Api-Key
      in: header
tags:
  - name: Info
  - name: TodoList
  - name: User