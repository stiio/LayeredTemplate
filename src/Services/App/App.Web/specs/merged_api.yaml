openapi: '3.1.1'
info:
  title: Merged Api
  version: 1.0.0
paths:
  /api/v1/info:
    get:
      tags:
        - Info
      summary: Get info
      operationId: GetInfoV1
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                description: Info response
                $ref: '#/components/schemas/InfoResponse'
            application/json:
              schema:
                description: Info response
                $ref: '#/components/schemas/InfoResponse'
            text/json:
              schema:
                description: Info response
                $ref: '#/components/schemas/InfoResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
  /api/v1/users/current_user:
    get:
      tags:
        - User
      summary: Get current user
      operationId: GetCurrentUserV1
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                description: Current user
                $ref: '#/components/schemas/CurrentUser'
            application/json:
              schema:
                description: Current user
                $ref: '#/components/schemas/CurrentUser'
            text/json:
              schema:
                description: Current user
                $ref: '#/components/schemas/CurrentUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - { }
  /api/v1/users/email/send_code:
    post:
      tags:
        - User
      summary: Send user email code
      operationId: SendUserEmailCodeV1
      requestBody:
        content:
          application/json:
            schema:
              description: User email code send request
              $ref: '#/components/schemas/UserEmailCodeSendRequest'
          text/json:
            schema:
              description: User email code send request
              $ref: '#/components/schemas/UserEmailCodeSendRequest'
          application/*+json:
            schema:
              description: User email code send request
              $ref: '#/components/schemas/UserEmailCodeSendRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                description: Successful result
                $ref: '#/components/schemas/SuccessfulResult'
            application/json:
              schema:
                description: Successful result
                $ref: '#/components/schemas/SuccessfulResult'
            text/json:
              schema:
                description: Successful result
                $ref: '#/components/schemas/SuccessfulResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - { }
  /api/v1/users/email/verify_code:
    put:
      tags:
        - User
      summary: Verify user email code
      operationId: VerifyUserEmailCodeV1
      requestBody:
        content:
          application/json:
            schema:
              description: User email code verify request
              $ref: '#/components/schemas/UserEmailCodeVerifyRequest'
          text/json:
            schema:
              description: User email code verify request
              $ref: '#/components/schemas/UserEmailCodeVerifyRequest'
          application/*+json:
            schema:
              description: User email code verify request
              $ref: '#/components/schemas/UserEmailCodeVerifyRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                description: Successful result
                $ref: '#/components/schemas/SuccessfulResult'
            application/json:
              schema:
                description: Successful result
                $ref: '#/components/schemas/SuccessfulResult'
            text/json:
              schema:
                description: Successful result
                $ref: '#/components/schemas/SuccessfulResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                description: Error result
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - { }
components:
  schemas:
    CurrentUser:
      type: object
      properties:
        id:
          type: string
          description: Id of user
          format: uuid
        email:
          type:
            - 'null'
            - string
          description: Email of user
          example: example@email.com
        emailVerified:
          type: boolean
          description: Email Verified
        phone:
          type:
            - 'null'
            - string
          description: Phone of user
        phoneVerified:
          type: boolean
          description: Phone Verified
        firstName:
          type:
            - 'null'
            - string
          description: First Name of user
          example: John
        lastName:
          type:
            - 'null'
            - string
          description: Last Name of user
          example: Doe
      additionalProperties: false
      description: Current user
    ErrorResult:
      type: object
      properties:
        message:
          type:
            - 'null'
            - string
          description: Message
        traceId:
          type:
            - 'null'
            - string
          description: Trace id
      additionalProperties: false
      description: Error result
    InfoResponse:
      type: object
      properties:
        buildDate:
          type:
            - 'null'
            - string
          description: Build date
          example: '2022-11-15T12:00:00.0000000Z'
        version:
          type:
            - 'null'
            - string
          description: Version
      additionalProperties: false
      description: Info response
    SuccessfulResult:
      type: object
      properties:
        message:
          type:
            - 'null'
            - string
          description: Message
      additionalProperties: false
      description: Successful result
    UserEmailCodeSendRequest:
      required:
        - email
      type: object
      properties:
        email:
          maxLength: 255
          minLength: 1
          type: string
          description: Email
          format: email
          example: example@email.com
      additionalProperties: false
      description: User email code send request
    UserEmailCodeVerifyRequest:
      required:
        - code
        - email
      type: object
      properties:
        email:
          maxLength: 255
          minLength: 1
          type: string
          description: Email
          format: email
          example: example@email.com
        code:
          type: integer
          description: Code
          format: int32
          example: 124567
      additionalProperties: false
      description: User email code verify request
  securitySchemes:
    Bearer:
      type: http
      description: Specify the authorization token.
      scheme: Bearer
      bearerFormat: JWT
    ApiKey:
      type: apiKey
      description: Specify the api key.
      name: X-Api-Key
      in: header
tags:
  - name: Info
  - name: User